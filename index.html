<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고전시가 셀프스터디</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif}
:root{
  --od:#0a2a4a;--om:#1a4f7a;--ol:#2176ae;--ob:#48a9e6;--op:#d0eaf8;--of:#eaf6fd;--wv:#63c5ea;
  --ton:#e8f4fd;--tom:#a8d4ef;--gold:#e8c46a;
}
body{background:var(--od);min-height:100vh}
.screen{display:none}
.screen.active{display:block}

.login-bg{min-height:100vh;background:linear-gradient(160deg,var(--od) 0%,var(--om) 100%);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:2.5rem;width:100%;max-width:380px}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem}
.login-logo .brush{font-size:44px;margin-bottom:.5rem}
.login-logo h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:.3rem}
.login-logo p{font-size:13px;color:var(--tom);text-align:center;line-height:1.6}
.login-field{margin-bottom:1rem}
.login-field label{font-size:12px;color:var(--tom);display:block;margin-bottom:5px}
.login-field input{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;outline:none;transition:border .2s}
.login-field input::placeholder{color:rgba(255,255,255,0.3)}
.login-field input:focus{border-color:var(--wv)}
.login-btn{width:100%;background:var(--gold);color:var(--od);border:none;border-radius:25px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:.5rem;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-hint{font-size:11px;color:rgba(255,255,255,0.32);text-align:center;margin-top:1rem}
.admin-toggle{text-align:center;margin-top:1.4rem}
.admin-link{font-size:11.5px;color:var(--tom);cursor:pointer;text-decoration:underline}
.admin-pw-field{margin-top:1rem;border-top:1px dashed rgba(255,255,255,0.15);padding-top:1rem}
.admin-enter-btn{background:rgba(255,255,255,0.15);color:#fff}
.admin-err{color:#ff8a8a;font-size:11.5px;text-align:center;margin-top:.5rem;min-height:14px}

.admin-section{background:#fff;border-radius:16px;padding:1.3rem;margin-bottom:1rem;border:1px solid var(--op)}
.admin-h{color:var(--od);font-size:15px;font-weight:700;margin-bottom:.8rem}
.admin-table{width:100%;border-collapse:collapse;font-size:12.5px}
.admin-table th{background:var(--of);color:var(--od);text-align:left;padding:8px 10px;font-size:11.5px}
.admin-table td{padding:8px 10px;border-bottom:1px solid var(--of);color:#3a5568;vertical-align:top}
.admin-table tr:last-child td{border-bottom:none}
.admin-btn{background:var(--od);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11.5px;font-weight:600;cursor:pointer}
.admin-btn.danger{background:#dc2626}
.admin-btn.secondary{background:var(--of);color:var(--od)}
.admin-btn.small{padding:4px 9px;font-size:11px}
.admin-part-row{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid var(--of);cursor:pointer}
.admin-part-row:hover{background:var(--of)}
.admin-part-row .apr-title{font-weight:700;color:var(--od);font-size:13.5px}
.admin-part-row .apr-desc{font-size:11px;color:#8aa3b5}
.admin-work-row{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--of)}
.admin-work-row .awr-name{font-size:13px;color:var(--od);font-weight:600;cursor:pointer}
.admin-editor textarea{width:100%;min-height:340px;font-family:'Consolas','Monaco',monospace;font-size:12px;border:1.5px solid var(--op);border-radius:10px;padding:12px;color:#1a2c3d;line-height:1.5}
.admin-editor-actions{display:flex;gap:8px;margin-top:.8rem;flex-wrap:wrap}
.admin-inline-input{border:1.5px solid var(--op);border-radius:8px;padding:8px 10px;font-size:13px;width:100%;margin-bottom:.6rem}
.admin-msg{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:.6rem;display:none}
.admin-msg.ok{background:#e3f7ea;color:#1e6b37;display:block}
.admin-msg.err{background:#fdeaea;color:#a33131;display:block}
.admin-crumb{font-size:12px;color:#8aa3b5;margin-bottom:.8rem;cursor:pointer}
.admin-crumb span{cursor:pointer;text-decoration:underline}

.nav{background:var(--od);border-bottom:1px solid rgba(255,255,255,0.1);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;color:var(--ton);font-size:16px;font-weight:600;cursor:pointer}
.nav-logo .brush{font-size:20px}
.nav-user{color:var(--tom);font-size:13px;cursor:pointer;white-space:nowrap}

.hero{position:relative;overflow:hidden;background:linear-gradient(160deg,var(--od) 0%,var(--om) 100%);padding:2.2rem 1.5rem 1.8rem;text-align:center}
.hero-stars{position:absolute;inset:0;pointer-events:none}
.falling-star{position:absolute;top:-20px;color:var(--gold);animation-name:fall;animation-timing-function:linear;animation-iteration-count:infinite}
@keyframes fall{from{transform:translateY(-20px) translateX(0);opacity:0}10%{opacity:1}to{transform:translateY(760px) translateX(var(--drift));opacity:0}}
.hero h2{color:#fff;font-size:21px;font-weight:700;position:relative;z-index:2}
.hero p{color:var(--tom);font-size:12.5px;margin-top:.4rem;position:relative;z-index:2}
.hero-stats{display:flex;justify-content:center;gap:2.2rem;margin-top:1.3rem;position:relative;z-index:2}
.stat-num{color:var(--gold);font-size:24px;font-weight:800}
.stat-lbl{color:var(--tom);font-size:10.5px;margin-top:2px}

.section-pad{padding:1.3rem 1.5rem}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:13px}
.tile{background:#fff;border-radius:16px;padding:1.05rem;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid var(--op);position:relative}
.tile:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(10,42,74,0.12)}
.tile-icon{font-size:24px;margin-bottom:.45rem}
.tile-name{font-size:14.5px;font-weight:700;color:var(--od);margin-bottom:.2rem}
.tile-desc{font-size:11px;color:#7996ab;line-height:1.4;min-height:30px}
.tile-bar{height:5px;background:var(--of);border-radius:3px;margin-top:.65rem;overflow:hidden}
.tile-bar-fill{height:100%;background:linear-gradient(90deg,var(--ob),var(--gold));border-radius:3px;transition:width .3s}
.tile-cnt{font-size:10px;color:#a4bccb;margin-top:.3rem}
.tile-badge{position:absolute;top:9px;right:9px;font-size:9.5px;background:var(--gold);color:var(--od);padding:2px 6px;border-radius:8px;font-weight:700}

.breadcrumb{padding:1rem 1.5rem 0;font-size:12px;color:var(--tom)}
.breadcrumb .lk{cursor:pointer;text-decoration:underline}
.page-title{padding:.4rem 1.5rem 1.1rem}
.page-title h2{color:#fff;font-size:19px;font-weight:700}
.page-title p{color:var(--tom);font-size:12.5px;margin-top:.3rem}

.tab-bar{display:flex;gap:6px;padding:0 1.5rem;margin-bottom:1rem}
.s-tab{flex:1;background:rgba(255,255,255,0.08);border:none;color:var(--tom);padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.s-tab.active{background:#fff;color:var(--od)}

.card-wrap{padding:0 1.5rem 2rem}

.text-card{background:#fff;border-radius:16px;padding:1.4rem;margin-bottom:1rem;border:1px solid var(--op)}
.text-card h3{color:var(--od);font-size:16px;margin-bottom:.2rem}
.text-card .meta{font-size:11.5px;color:#8aa3b5;margin-bottom:1rem}
.line-row{display:flex;justify-content:space-between;gap:1rem;padding:9px 0;border-bottom:1px dashed var(--op);flex-wrap:wrap}
.line-row:last-child{border-bottom:none}
.line-orig{font-size:14px;color:var(--od);font-weight:600}
.line-orig .ry{font-size:11.5px;color:#7996ab;font-weight:400;margin-left:4px}
.line-kor{font-size:12.5px;color:#3a5568;text-align:right;flex:1;min-width:130px}
.story-box{background:var(--of);border-left:4px solid var(--ob);border-radius:8px;padding:1rem 1.1rem;font-size:13px;color:#2c4a63;line-height:1.7;margin-top:1rem}
.story-box b{color:var(--od)}

.theory-card{background:#fff;border-radius:16px;padding:1.3rem;margin-bottom:1rem;border:1px solid var(--op)}
.theory-card h4{color:var(--ol);font-size:13.5px;margin:.9rem 0 .4rem;font-weight:700}
.theory-card h4:first-child{margin-top:0}
.theory-card p,.theory-card li{font-size:13px;color:#3a5568;line-height:1.7}
.theory-card ul{padding-left:1.1rem}
.key-row{display:flex;gap:8px;font-size:12.5px;color:var(--od);padding:5px 0;align-items:flex-start}
.key-row .dot{color:var(--gold);flex-shrink:0}
.go-quiz{width:100%;background:var(--od);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:.5rem}

.fc-wrap{padding:0 1.5rem 2rem;display:flex;flex-direction:column;align-items:center}
.fc-progress{color:var(--tom);font-size:12px;margin-bottom:.8rem}
.fc-card{width:100%;max-width:420px;min-height:200px;perspective:1200px;cursor:pointer}
.fc-inner{position:relative;width:100%;min-height:200px;transition:transform .5s;transform-style:preserve-3d}
.fc-card.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:1.5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.fc-front{background:#fff;border:1px solid var(--op)}
.fc-back{background:var(--om);color:#fff;transform:rotateY(180deg)}
.fc-front .h{font-size:18px;font-weight:700;color:var(--od);margin-bottom:.5rem}
.fc-front .r{font-size:13px;color:#8aa3b5}
.fc-back .k{font-size:15.5px;font-weight:600;line-height:1.6}
.fc-hint{font-size:11px;color:var(--tom);margin-top:.9rem}
.fc-nav{display:flex;gap:10px;margin-top:1.2rem;width:100%;max-width:420px}
.fc-btn{flex:1;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:11px;font-size:13px;font-weight:600;cursor:pointer}
.fc-btn.primary{background:var(--gold);color:var(--od);border:none}

.quiz-card{background:#fff;border-radius:16px;padding:1.4rem;margin:0 1.5rem}
.qtype-pill{display:inline-block;font-size:11px;color:var(--ol);background:var(--of);padding:3px 10px;border-radius:20px;margin-bottom:.8rem;font-weight:600}
.quiz-q{font-size:14.5px;font-weight:600;color:var(--od);line-height:1.6;margin-bottom:1.1rem}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;text-align:left;background:var(--of);border:1.5px solid transparent;border-radius:10px;padding:12px 14px;font-size:13px;color:#2c4a63;cursor:pointer;transition:all .12s}
.opt:hover{border-color:var(--op)}
.opt.ok{background:#e3f7ea;border-color:#34a853;color:#1e6b37}
.opt.no{background:#fdeaea;border-color:#e05252;color:#a33131}
.opt-n{font-weight:800;color:var(--ol)}
.opt.ok .opt-n,.opt.no .opt-n{color:inherit}
.fill-inp{width:100%;border:1.5px solid var(--op);border-radius:10px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:.8rem}
.fill-inp:focus{border-color:var(--ob)}
.chk-btn{background:var(--od);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer}
.fb{margin-top:1rem;padding:12px 14px;border-radius:10px;font-size:13px;display:none;align-items:flex-start;gap:8px;line-height:1.6}
.fb.ok{background:#e3f7ea;color:#1e6b37;display:flex}
.fb.no{background:#fdeaea;color:#a33131;display:flex}
.qfooter{display:flex;justify-content:space-between;align-items:center;margin-top:1.2rem}
.next-btn{display:none;background:var(--gold);color:var(--od);border:none;border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer}
.qcnt{font-size:11px;color:#8aa3b5;text-align:right}
.qdots{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;max-width:120px;justify-content:flex-end}
.qdot{width:6px;height:6px;border-radius:50%;background:var(--op)}
.qdot.done{background:var(--ob)}
.qdot.curr{background:var(--gold)}

.score-card{background:#fff;border-radius:16px;padding:2rem 1.4rem;margin:0 1.5rem;text-align:center}
.score-circle{width:130px;height:130px;border-radius:50%;border:6px solid var(--ob);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.2rem}
.score-big{font-size:22px;font-weight:800;color:var(--od)}
.score-sub{font-size:13px;color:#8aa3b5;margin-top:2px}
.score-msg{font-size:16px;font-weight:700;color:var(--od);margin-bottom:.3rem}
.score-det{font-size:12.5px;color:#8aa3b5;margin-bottom:1.4rem}
.score-btns{display:flex;flex-direction:column;gap:8px}
.btn-oc{background:var(--od);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer}
.btn-gh{background:var(--of);color:var(--od);border:none;border-radius:10px;padding:12px;font-size:13.5px;font-weight:600;cursor:pointer}

@media(max-width:480px){.tiles{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="sl" class="screen active">
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <div class="brush">📜</div>
        <h1>고전시가 셀프스터디</h1>
        <p>9개 갈래 · 원문·배경설화·해설을 익히고<br>암기카드와 퀴즈로 점검해요</p>
      </div>
      <div class="login-field"><label>이름 / 별명</label><input type="text" id="nickname" placeholder="이름 또는 별명 입력" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="login-btn" onclick="doLogin()">학습 시작하기</button>
      <div class="login-hint">입력한 이름과 진도는 학급 전체가 조회할 수 있습니다</div>
      <div class="admin-toggle" id="adminToggleWrap">
        <span class="admin-link" onclick="showAdminField()">관리자이신가요? 관리자 모드로 입장</span>
      </div>

        <label>관리자 비밀번호</label>
        <input type="password" id="adminPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryAdminLogin()"/>
        <button class="login-btn admin-enter-btn" onclick="tryAdminLogin()">관리자 모드 입장</button>
        <div class="admin-err" id="adminErr"></div>
      </div>
    </div>
  </div>
</div>

<div id="sadmin" class="screen">
  <div class="nav">
    <div class="nav-logo"><span class="brush">🛠</span>관리자 모드</div>

  </div>
  <div class="tab-bar" style="padding-top:1rem">
    <button class="s-tab active" id="tabUsers" onclick="switchAdminTab('users')">👥 사용자 관리</button>
    <button class="s-tab" id="tabContent" onclick="switchAdminTab('content')">📚 콘텐츠·문제 관리</button>
  </div>
  <div id="adminBody" class="section-pad" style="padding-top:0"></div>
</div>

<div id="sh" class="screen">
  <div class="nav">
    <div class="nav-logo"><span class="brush">📜</span>고전시가 셀프스터디</div>
    <div class="nav-user" onclick="logout()">👤<span id="uname"></span>&nbsp;·&nbsp;나가기</div>
  </div>

    <div class="hero-stats">
      <div><div class="stat-num" id="tparts">9</div><div class="stat-lbl">갈래</div></div>
      <div><div class="stat-num" id="tsubs">0</div><div class="stat-lbl">작품 수</div></div>
      <div><div class="stat-num" id="dcnt">0</div><div class="stat-lbl">학습 완료</div></div>
    </div>
  </div>
  <div class="section-pad">
    <div class="tiles" id="tiles"></div>
  </div>
</div>

<div id="ssub" class="screen">

    <div class="nav-logo" onclick="goHome()"><span class="brush">📜</span>고전시가 셀프스터디</div>
    <div class="nav-user" onclick="logout()">👤<span id="uname2"></span>&nbsp;·&nbsp;나가기</div>
  </div>

    <div class="nav-logo" onclick="goHome()"><span class="brush">📜</span>고전시가 셀프스터디</div>
    <div class="nav-user" onclick="logout()">👤<span id="uname3"></span>&nbsp;·&nbsp;나가기</div>
  </div>
  <div class="breadcrumb"><span class="lk" onclick="goHome()">전체 갈래</span> &nbsp;›&nbsp; <span class="lk" onclick="goSub()" id="bcp"></span> &nbsp;›&nbsp; <span id="bcsub" style="color:#fff"></span></div>

    <button class="s-tab active" id="tth" onclick="swTab('theory')">📖 원문·해설</button>
    <button class="s-tab" id="tfc" onclick="swTab('flash')">🗂 암기카드</button>

  </div>
  <div id="thc"></div>

  <div id="qzc" style="display:none"></div>
</div>

<script>
const DEFAULT_PARTS = [
{id:'gd',title:'고대가요',icon:'🏺',desc:'구지가·해가·공무도하가·황조가·정읍사',works:[
{id:'guji',title:'구지가',hanja:'龜旨歌',desc:'가락국 건국신화 속 집단 무가',
 lines:[
  {h:'龜何龜何',r:'구하구하',k:'거북아 거북아'},
  {h:'首其現也',r:'수기현야',k:'머리를 내밀어라'},
  {h:'若不現也',r:'약불현야',k:'내밀지 않으면'},
  {h:'燔灼而喫也',r:'번작이끽야',k:'구워서 먹으리라'}
 ],
 story:'신라 유리왕 19년(A.D.42) 3월, 김해 구지봉에서 사람들이 이상한 소리를 들었습니다. 하늘에서 "이 땅에 내려와 나라를 세우고 임금이 되라는 명을 받았으니, 봉우리의 흙을 파며 노래하고 춤을 추라"는 소리가 들려왔고, 구간(九干)을 비롯한 무리 2~3백 명이 그 말대로 노래하며 춤을 추었습니다. 얼마 후 하늘에서 자줏빛 줄이 드리워지고, 그 끝에 매달린 금합 속에서 해처럼 둥근 황금 알 여섯 개가 나왔습니다. 열흘 뒤 알에서 사람이 태어났는데, 그중 처음 나타난 이가 수로왕이며 가락국(가야)을 세웠습니다. 「삼국유사」에 전합니다.',
 theory:[

//  STATE
// ════════════════════════════════════════
let CP=null, CS=null, CQ=0, ANS=false, CC_CNT=0, FCI=0;
let currentUser='';
let PROG={}; // {workId:{done:bool,best:pct}}
let PARTS=[]; // populated from DEFAULT_PARTS or shared override in initContent()
const ADMIN_PASSWORD = '23456789!@#';
let isAdmin=false;
let ADMIN_CUR_PART=null, ADMIN_CUR_WORK=null;

// ── content load/save (shared across all users) ──
async function initContent(){
  try{
    const r=await window.storage.get('content:parts', true);
    PARTS = r ? JSON.parse(r.value) : JSON.parse(JSON.stringify(DEFAULT_PARTS));
  }catch(e){
    PARTS = JSON.parse(JSON.stringify(DEFAULT_PARTS));
  }
}
async function saveContent(){
  try{ await window.storage.set('content:parts', JSON.stringify(PARTS), true); return true; }
  catch(e){ return false; }
}

// ── progress (shared, keyed by nickname, so admin can see all users) ──
async function loadProg(){
  try{
    const r=await window.storage.get('progress:'+currentUser, true);
    PROG=r?JSON.parse(r.value):{};
  }catch(e){PROG={};}
}
async function saveProg(){
  try{ await window.storage.set('progress:'+currentUser, JSON.stringify(PROG), true); }catch(e){}
}

// ── user registry (shared list of everyone who has logged in) ──
async function registerUser(name){
  try{
    let list=[];
    try{
      const r=await window.storage.get('users_registry', true);
      list = r? JSON.parse(r.value) : [];
    }catch(e){ list=[]; }
    const existing = list.find(u=>u.name===name);
    if(existing){ existing.lastActive = Date.now(); }
    else { list.push({name, firstActive:Date.now(), lastActive:Date.now()}); }
    await window.storage.set('users_registry', JSON.stringify(list), true);
  }catch(e){}
}
async function getUserRegistry(){
  try{
    const r=await window.storage.get('users_registry', true);
    return r? JSON.parse(r.value) : [];
  }catch(e){ return []; }
}
async function getUserProgress(name){
  try{
    const r=await window.storage.get('progress:'+name, true);
    return r? JSON.parse(r.value) : {};
  }catch(e){ return {}; }
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

async function doLogin(){
  const n=document.getElementById('nickname').value.trim();
  if(!n){ alert('이름 또는 별명을 입력해 주세요.'); return; }
  currentUser=n;
  await initContent();
  await registerUser(n);
  await loadProg();
  document.getElementById('uname').textContent=n;
  document.getElementById('uname2').textContent=n;
  document.getElementById('uname3').textContent=n;
  renderHome();
  show('sh');
}
function logout(){ show('sl'); document.getElementById('nickname').value=''; resetAdminLoginField(); }

// ════════════════════════════════════════
//  ADMIN — login
// ════════════════════════════════════════
function showAdminField(){
  document.getElementById('adminPwField').style.display='block';
  document.getElementById('adminToggleWrap').style.display='none';
  document.getElementById('adminPw').focus();
}
function resetAdminLoginField(){
  const f=document.getElementById('adminPwField'); if(f) f.style.display='none';
  const t=document.getElementById('adminToggleWrap'); if(t) t.style.display='block';
  const pw=document.getElementById('adminPw'); if(pw) pw.value='';
  const err=document.getElementById('adminErr'); if(err) err.textContent='';
}
async function tryAdminLogin(){
  const pw=document.getElementById('adminPw').value;
  if(pw!==ADMIN_PASSWORD){
    document.getElementById('adminErr').textContent='비밀번호가 올바르지 않습니다.';
    return;
  }
  isAdmin=true;
  await initContent();
  switchAdminTab('users');
  show('sadmin');
}
function adminLogout(){
  isAdmin=false;
  show('sl');
  resetAdminLoginField();
}

// ════════════════════════════════════════
//  ADMIN — dashboard
// ════════════════════════════════════════
function switchAdminTab(tab){
  document.getElementById('tabUsers').classList.toggle('active',tab==='users');
  document.getElementById('tabContent').classList.toggle('active',tab==='content');
  if(tab==='users') renderAdminUsers();
  else { ADMIN_CUR_PART=null; ADMIN_CUR_WORK=null; renderAdminContentPartList(); }
}

async function renderAdminUsers(){
  const body=document.getElementById('adminBody');
  body.innerHTML=`<div class="admin-section"><div class="admin-h">사용자 목록을 불러오는 중…</div></div>`;
  const registry = await getUserRegistry();
  if(registry.length===0){
    body.innerHTML=`<div class="admin-section"><div class="admin-h">사용자 관리</div><p style="font-size:13px;color:#8aa3b5">아직 로그인한 사용자가 없습니다.</p></div>`;
    return;
  }
  const totalWorks = PARTS.reduce((a,p)=>a+p.works.length,0);
  let rows='';
  for(const u of registry){
    const prog = await getUserProgress(u.name);
    const doneList = Object.entries(prog).filter(([k,v])=>v.done);
    const doneCount = doneList.length;
    const avg = doneCount? Math.round(doneList.reduce((a,[k,v])=>a+(v.best||0),0)/doneCount) : 0;
    const last = new Date(u.lastActive).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    rows+=`<tr>
      <td><b>${u.name}</b></td>
      <td>${doneCount} / ${totalWorks}</td>
      <td>${doneCount? avg+'점':'-'}</td>
      <td>${last}</td>
      <td><button class="admin-btn danger small" onclick="adminResetUser('${u.name.replace(/'/g,"\\'")}')">진도 초기화</button></td>
    </tr>`;
  }
  body.innerHTML=`
    <div class="admin-section">
      <div class="admin-h">사용자 관리 (${registry.length}명)</div>
      <table class="admin-table">
        <tr><th>이름</th><th>완료</th><th>평균 점수</th><th>최근 접속</th><th>관리</th></tr>
        ${rows}
      </table>
    </div>`;
}
async function adminResetUser(name){
  if(!confirm(`"${name}" 님의 학습 진도를 모두 초기화할까요? 되돌릴 수 없습니다.`)) return;
  try{ await window.storage.set('progress:'+name, JSON.stringify({}), true); }catch(e){}
  renderAdminUsers();
}

// ── content management: part list ──
function renderAdminContentPartList(){
  const body=document.getElementById('adminBody');
  let rows=PARTS.map((p,i)=>`
    <div class="admin-part-row" onclick="openAdminPart('${p.id}')">
      <div>
        <div class="apr-title">${p.icon} ${p.title}</div>
        <div class="apr-desc">${p.works.length}개 작품 · ${p.desc}</div>
      </div>
      <button class="admin-btn secondary small" onclick="event.stopPropagation();adminEditPartMeta('${p.id}')">갈래 정보 수정</button>
    </div>`).join('');
  body.innerHTML=`
    <div class="admin-section">
      <div class="admin-h">콘텐츠·문제 관리 — 갈래 선택</div>
      ${rows}
      <div class="admin-editor-actions"><button class="admin-btn" onclick="adminAddPart()">+ 새 갈래 추가</button></div>
      <div class="admin-msg" id="adminMsg"></div>
    </div>`;
}
function adminMsg(text, ok){
  const el=document.getElementById('adminMsg'); if(!el) return;
  el.className='admin-msg '+(ok?'ok':'err');
  el.textContent=text;
  setTimeout(()=>{ el.className='admin-msg'; }, 3000);
}
function adminEditPartMeta(partId){
  const p=PARTS.find(x=>x.id===partId);
  const newTitle=prompt('갈래 이름', p.title); if(newTitle===null) return;
  const newDesc=prompt('갈래 설명', p.desc); if(newDesc===null) return;
  const newIcon=prompt('아이콘(이모지 1개)', p.icon); if(newIcon===null) return;
  p.title=newTitle.trim()||p.title; p.desc=newDesc.trim()||p.desc; p.icon=newIcon.trim()||p.icon;
  saveContent().then(ok=>{ renderAdminContentPartList(); adminMsg(ok?'저장되었습니다.':'저장에 실패했습니다.', ok); });
}
function adminAddPart(){
  const id=prompt('새 갈래의 영문 id (예: newpart, 공백없이)'); if(!id) return;
  if(PARTS.some(p=>p.id===id)){ alert('이미 존재하는 id입니다.'); return; }
  const title=prompt('갈래 이름')||'새 갈래';
  const desc=prompt('갈래 설명')||'';
  const icon=prompt('아이콘(이모지 1개)')||'📘';
  PARTS.push({id, title, icon, desc, works:[]});
  saveContent().then(ok=>{ renderAdminContentPartList(); adminMsg(ok?'새 갈래가 추가되었습니다.':'저장 실패', ok); });
}

// ── content management: work list within a part ──
function openAdminPart(partId){
  ADMIN_CUR_PART=PARTS.find(p=>p.id===partId);
  renderAdminWorkList();
}
function renderAdminWorkList(){
  const p=ADMIN_CUR_PART;
  const body=document.getElementById('adminBody');
  const rows=p.works.map(w=>`
    <div class="admin-work-row">
      <span class="awr-name" onclick="openAdminWork('${w.id}')">🎴 ${w.title}</span>
      <span>
        <button class="admin-btn secondary small" onclick="openAdminWork('${w.id}')">편집</button>
        <button class="admin-btn danger small" onclick="adminDeleteWork('${w.id}')">삭제</button>
      </span>
    </div>`).join('') || '<p style="font-size:12.5px;color:#8aa3b5">아직 작품이 없습니다.</p>';
  body.innerHTML=`
    <div class="admin-crumb"><span onclick="renderAdminContentPartList()">전체 갈래</span> › ${p.icon} ${p.title}</div>
    <div class="admin-section">
      <div class="admin-h">${p.title} — 작품 목록 (${p.works.length})</div>
      ${rows}
      <div class="admin-editor-actions"><button class="admin-btn" onclick="adminAddWork()">+ 새 작품 추가</button></div>
      <div class="admin-msg" id="adminMsg"></div>
    </div>`;
}
function adminDeleteWork(workId){
  const w=ADMIN_CUR_PART.works.find(x=>x.id===workId);
  if(!confirm(`"${w.title}" 작품을 삭제할까요? 되돌릴 수 없습니다.`)) return;
  ADMIN_CUR_PART.works = ADMIN_CUR_PART.works.filter(x=>x.id!==workId);
  saveContent().then(ok=>{ renderAdminWorkList(); adminMsg(ok?'삭제되었습니다.':'저장 실패', ok); });
}
function adminAddWork(){
  const id=prompt('새 작품의 영문 id (예: mywork, 공백없이)'); if(!id) return;
  if(ADMIN_CUR_PART.works.some(w=>w.id===id)){ alert('이미 존재하는 id입니다.'); return; }
  const template={
    id, title:'새 작품', hanja:'', desc:'설명을 입력하세요',
    lines:[{h:'원문 한 줄',r:'',k:'해석'}],
    story:'',
    theory:[{h:'항목 제목',b:'<p>설명 내용</p>'}],
    keys:['핵심 정리 1'],
    quiz:[{type:'mc',q:'문제를 입력하세요',opts:['보기1','보기2','보기3','보기4'],ans:0,exp:'해설'}]
  };
  ADMIN_CUR_PART.works.push(template);
  saveContent().then(ok=>{ openAdminWork(id); adminMsg(ok?'새 작품이 추가되었습니다. 아래에서 내용을 편집해 주세요.':'저장 실패', ok); });
}

// ── content management: JSON editor for one work ──
function openAdminWork(workId){
  ADMIN_CUR_WORK=ADMIN_CUR_PART.works.find(w=>w.id===workId);
  renderAdminWorkEditor();
}
function renderAdminWorkEditor(){
  const w=ADMIN_CUR_WORK, p=ADMIN_CUR_PART;
  const body=document.getElementById('adminBody');
  const json=JSON.stringify(w,null,2);
  body.innerHTML=`
    <div class="admin-crumb"><span onclick="renderAdminContentPartList()">전체 갈래</span> › <span onclick="renderAdminWorkList()">${p.title}</span> › ${w.title}</div>
    <div class="admin-section admin-editor">
      <div class="admin-h">${w.title} — 내용·문제 편집 (JSON)</div>
      <p style="font-size:12px;color:#8aa3b5;margin-bottom:.6rem">
        title/desc/hanja/lines(원문)/story(배경설화)/theory(해설, h=제목·b=HTML 본문)/keys(핵심정리 목록)/quiz(mc는 opts+ans(정답 인덱스 0부터)+exp, fill은 blank+exp) 형식의 JSON입니다. 수정 후 저장을 누르세요.
      </p>
      <textarea id="workJsonArea" spellcheck="false">${json.replace(/</g,'&lt;')}</textarea>
      <div class="admin-editor-actions">
        <button class="admin-btn" onclick="saveAdminWorkJson()">저장</button>
        <button class="admin-btn secondary" onclick="renderAdminWorkEditor()">되돌리기</button>
        <button class="admin-btn danger" onclick="adminDeleteWork('${w.id}')">이 작품 삭제</button>
      </div>
      <div class="admin-msg" id="adminMsg"></div>
    </div>`;
}
async function saveAdminWorkJson(){
  const ta=document.getElementById('workJsonArea');
  let parsed;
  try{ parsed=JSON.parse(ta.value); }
  catch(e){ adminMsg('JSON 형식이 올바르지 않습니다: '+e.message, false); return; }
  if(!parsed.id||!parsed.title||!Array.isArray(parsed.quiz)){
    adminMsg('id, title, quiz(배열)는 반드시 있어야 합니다.', false); return;
  }
  for(const q of parsed.quiz){
    if(q.type==='mc' && (!Array.isArray(q.opts) || typeof q.ans!=='number')){
      adminMsg('객관식 문제는 opts(배열)와 ans(정답 인덱스 숫자)가 필요합니다.', false); return;
    }
    if(q.type==='fill' && !q.blank){
      adminMsg('빈칸 문제는 blank(정답)이 필요합니다.', false); return;
    }
  }
  const idx=ADMIN_CUR_PART.works.findIndex(x=>x.id===ADMIN_CUR_WORK.id);
  if(parsed.id!==ADMIN_CUR_WORK.id && ADMIN_CUR_PART.works.some(w=>w.id===parsed.id)){
    adminMsg('이미 존재하는 id로는 변경할 수 없습니다.', false); return;
  }
  ADMIN_CUR_PART.works[idx]=parsed;
  ADMIN_CUR_WORK=parsed;
  const ok=await saveContent();
  if(ok) renderAdminWorkEditor();
  adminMsg(ok?'저장되었습니다.':'저장에 실패했습니다.', ok);
}

function renderFallingStars(){
  const wrap=document.getElementById('hero-stars'); if(!wrap) return;
  let html='';
  for(let i=0;i<16;i++){
    const left=Math.random()*100, delay=(Math.random()*6).toFixed(2), duration=(3+Math.random()*3).toFixed(2);
    const size=8+Math.round(Math.random()*8), drift=(Math.random()*40-20).toFixed(0)+'px', op=(0.4+Math.random()*0.5).toFixed(2);
    html+=`<div class="falling-star" style="left:${left}%;font-size:${size}px;animation-delay:${delay}s;animation-duration:${duration}s;--drift:${drift};opacity:${op}">✦</div>`;
  }
  wrap.innerHTML=html;
}

// ════════════════════════════════════════
//  HOME — 9 PART TILES
// ════════════════════════════════════════
function renderHome(){
  renderFallingStars();
  const totalWorks=PARTS.reduce((a,p)=>a+p.works.length,0);
  const doneCount=Object.values(PROG).filter(p=>p.done).length;
  document.getElementById('tsubs').textContent=totalWorks;
  document.getElementById('dcnt').textContent=doneCount;
  document.getElementById('tiles').innerHTML=PARTS.map(p=>{
    const doneInPart=p.works.filter(w=>PROG[w.id]&&PROG[w.id].done).length;
    const pct=Math.round(doneInPart/p.works.length*100);
    return `<div class="tile" onclick="openPart('${p.id}')">
      <div class="tile-icon">${p.icon}</div>
      <div class="tile-name">${p.title}</div>
      <div class="tile-desc">${p.desc}</div>
      <div class="tile-bar"><div class="tile-bar-fill" style="width:${pct}%"></div></div>
      <div class="tile-cnt">${doneInPart}/${p.works.length} 완료</div>
    </div>`;
  }).join('');
}
function goHome(){ renderHome(); show('sh'); }

// ════════════════════════════════════════
//  SUB — WORKS WITHIN A PART
// ════════════════════════════════════════
function openPart(id){
  CP=PARTS.find(p=>p.id===id);
  document.getElementById('parttitle').textContent=CP.icon+' '+CP.title;
  document.getElementById('partdesc').textContent=CP.desc;
  document.getElementById('subtiles').innerHTML=CP.works.map(w=>{
    const p=PROG[w.id];
    const pct=p&&p.best!=null?p.best:0;
    return `<div class="tile" onclick="openStudy('${w.id}')">
      ${p&&p.done?'<div class="tile-badge">완료</div>':''}
      <div class="tile-icon">🎴</div>
      <div class="tile-name">${w.title}</div>
      <div class="tile-desc">${w.desc}</div>
      <div class="tile-bar"><div class="tile-bar-fill" style="width:${pct}%"></div></div>
      <div class="tile-cnt">${p?('최고 점수 '+pct+'%'):'미학습'}</div>
    </div>`;
  }).join('');
  show('ssub');
}
function goSub(){ openPart(CP.id); }

// ════════════════════════════════════════
//  STUDY
// ════════════════════════════════════════
function openStudy(workId){
  CS=CP.works.find(w=>w.id===workId);
  document.getElementById('bcp').textContent=CP.title;
  document.getElementById('bcsub').textContent=CS.title;
  document.getElementById('stitle').textContent=CS.title+(CS.hanja?' ('+CS.hanja+')':'');
  document.getElementById('sdesc').textContent=CS.desc;
  CQ=0;ANS=false;CC_CNT=0;FCI=0;
  document.getElementById('tth').classList.add('active');
  document.getElementById('tfc').classList.remove('active');
  document.getElementById('tqz').classList.remove('active');
  document.getElementById('thc').style.display='';
  document.getElementById('fcc').style.display='none';
  document.getElementById('qzc').style.display='none';
  renderTheory();
  show('sst');
}

function swTab(tab){
  document.getElementById('tth').classList.toggle('active',tab==='theory');
  document.getElementById('tfc').classList.toggle('active',tab==='flash');
  document.getElementById('tqz').classList.toggle('active',tab==='quiz');
  document.getElementById('thc').style.display=tab==='theory'?'':'none';
  document.getElementById('fcc').style.display=tab==='flash'?'':'none';
  document.getElementById('qzc').style.display=tab==='quiz'?'':'none';
  if(tab==='flash'){FCI=0;renderFlash();}
  else if(tab==='quiz'){CQ=0;ANS=false;CC_CNT=0;renderQuiz();}
  else renderTheory();
}

// ── 원문·해설 ──
function renderTheory(){
  const w=CS;
  const lineRows=(w.lines||[]).map(l=>`<div class="line-row"><div class="line-orig">${l.h}${l.r?`<span class="ry">(${l.r})</span>`:''}</div><div class="line-kor">${l.k}</div></div>`).join('');
  const secs=w.theory.map(s=>`<h4>▸ ${s.h}</h4>${s.b}`).join('');
  const keys=w.keys.map(k=>`<div class="key-row"><span class="dot">✔</span><span>${k}</span></div>`).join('');
  const storyHtml = w.story ? `<div class="story-box"><b>${w.storyLabel||'배경설화'}</b><br>${w.story}</div>` : '';
  document.getElementById('thc').innerHTML=`
    <div class="card-wrap">
      <div class="text-card">
        <h3>원문</h3><div class="meta">${w.hanja||''}</div>
        ${lineRows}
        ${storyHtml}
      </div>
      <div class="theory-card">${secs}<div style="margin-top:.8rem">${keys}</div></div>
      <button class="go-quiz" onclick="swTab('flash')">🗂 암기카드로 외워보기</button>
    </div>`;
}

// ── 암기카드 ──
function renderFlash(){
  const w=CS, lines=w.lines&&w.lines.length?w.lines:[{h:w.title,r:'',k:w.desc}];
  const l=lines[FCI];
  document.getElementById('fcc').innerHTML=`
    <div class="fc-wrap">
      <div class="fc-progress">${FCI+1} / ${lines.length}</div>
      <div class="fc-card" id="fcCard" onclick="flipCard()">
        <div class="fc-inner" id="fcInner">
          <div class="fc-face fc-front">
            <div class="h">${l.h}</div>
            <div class="r">${l.r?'('+l.r+')':''}</div>
            <div class="fc-hint">탭하면 해석이 보여요</div>
          </div>
          <div class="fc-face fc-back">
            <div class="k">${l.k}</div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="fc-btn" onclick="fcMove(-1)">← 이전</button>
        <button class="fc-btn primary" onclick="fcMove(1)">다음 →</button>
      </div>
    </div>`;
}
function flipCard(){ document.getElementById('fcCard').classList.toggle('flipped'); }
function fcMove(d){
  const lines=CS.lines&&CS.lines.length?CS.lines:[{}];
  FCI+=d;
  if(FCI<0)FCI=lines.length-1;
  if(FCI>=lines.length)FCI=0;
  renderFlash();
}

// ── 퀴즈 ──
function renderQuiz(){
  const qs=CS.quiz;
  if(CQ>=qs.length){ renderScore(); return; }
  const q=qs[CQ]; ANS=false;
  const dots=qs.map((_,i)=>`<div class="qdot ${i<CQ?'done':i===CQ?'curr':''}"></div>`).join('');
  let inn=`<div class="qtype-pill">${q.type==='mc'?'객관식':'빈칸 채우기'}</div>`;
  if(q.type==='mc'){
    inn+=`<div class="quiz-q">${q.q}</div><div class="opts">${q.opts.map((o,i)=>
      `<button class="opt" onclick="selOpt(${i})"><span class="opt-n">${['①','②','③','④'][i]}</span>${o}</button>`).join('')}</div>`;
  } else {
    inn+=`<div class="quiz-q">${q.q.replace(/_+/,'<span id="bl">　　</span>')}</div>
      <input class="fill-inp" type="text" id="fi" placeholder="답을 입력하세요..." onkeydown="if(event.key==='Enter')chkFill()"/>
      <button class="chk-btn" onclick="chkFill()">확인</button>`;
  }
  document.getElementById('qzc').innerHTML=`
    <div class="card-wrap"><div class="quiz-card">${inn}
      <div class="fb" id="fb"></div>
      <div class="qfooter">
        <button class="next-btn" id="nb" onclick="nextQ()">다음 →</button>
        <div><div class="qcnt">${CQ+1} / ${qs.length}</div><div class="qdots">${dots}</div></div>
      </div>
    </div></div>`;
}
function selOpt(i){
  if(ANS)return; ANS=true;
  const q=CS.quiz[CQ], ok=i===q.ans; if(ok)CC_CNT++;
  document.querySelectorAll('.opt').forEach((b,j)=>{
    if(j===i)b.classList.add(ok?'ok':'no');
    if(j===q.ans&&!ok)b.classList.add('ok');
  });
  showFB(ok,q.exp);
}
function chkFill(){
  if(ANS)return; ANS=true;
  const q=CS.quiz[CQ];
  const raw=document.getElementById('fi').value.trim();
  const v=raw.replace(/\s/g,'');
  const blanks=[q.blank].concat(q.altBlanks||[]);
  const ok=blanks.some(b=>v===b.replace(/\s/g,''));
  if(ok)CC_CNT++;
  const bl=document.getElementById('bl'); if(bl)bl.textContent=q.blank;
  showFB(ok, ok?'정답입니다!':'정답: '+q.blank+' — '+q.exp);
}
function showFB(ok,msg){
  const fb=document.getElementById('fb');
  fb.className='fb '+(ok?'ok':'no');
  fb.innerHTML=`<span>${ok?'✓ 정답! ':'✗ 오답. '}${msg}</span>`;
  document.getElementById('nb').style.display='flex';
}
function nextQ(){ CQ++; renderQuiz(); }

async function renderScore(){
  const tot=CS.quiz.length, pct=Math.round(CC_CNT/tot*100);
  if(!PROG[CS.id])PROG[CS.id]={done:false,best:0};
  PROG[CS.id].done=true;
  PROG[CS.id].best=Math.max(PROG[CS.id].best||0,pct);
  await saveProg();
  const msg=pct===100?'완벽해요! 🎉':pct>=80?'잘했어요! 👍':pct>=60?'조금 더 연습해요 📚':'원문·해설을 복습해 보세요 🔍';
  const bc=pct===100?'#15803d':pct>=60?'var(--ol)':'#dc2626';
  document.getElementById('qzc').innerHTML=`
    <div class="card-wrap"><div class="score-card">
      <div class="score-circle" style="border-color:${bc}">
        <div class="score-big">${CC_CNT}/${tot}</div>
        <div class="score-sub">${pct}점</div>
      </div>
      <div class="score-msg">${msg}</div>
      <div class="score-det">맞힌 문제 ${CC_CNT}개 · 틀린 문제 ${tot-CC_CNT}개</div>
      <div class="score-btns">
        <button class="btn-oc" onclick="goSub()">작품 목록으로</button>
        <button class="btn-gh" onclick="CQ=0;CC_CNT=0;renderQuiz()">다시 풀기</button>
        <button class="btn-gh" onclick="swTab('theory')">원문·해설 복습하기</button>
      </div>
    </div></div>`;
}

</script>
</body>
</html>
